<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QuizApp</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .tab-btn { padding: 10px 20px; background: transparent; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .tab-btn.active { border-bottom-color: var(--primary); color: var(--primary); }
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><span>📚</span> QuizApp Admin</div>
            <div class="nav-links" id="nav-links"></div>
            <div class="auth-buttons" id="auth-buttons"></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 30px;">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('quizzes', this)">Manage Quizzes</button>
            <button class="tab-btn" onclick="switchTab('questions', this)">Manage Questions</button>
            <button class="tab-btn" onclick="switchTab('students', this)">Students & Results</button>
        </div>

        <div id="quizzes" class="admin-section active">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Quizzes</h2>
                <button class="btn btn-primary" onclick="alert('Add Quiz Modal')">+ Create Quiz</button>
            </div>
            <div class="grid-3" id="admin-quiz-grid"></div>
        </div>

        <div id="questions" class="admin-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Question Bank</h2>
                <button class="btn btn-primary" onclick="alert('Add Question Modal')">+ Add Question</button>
            </div>
            <div id="questions-list"></div>
        </div>

        <div id="students" class="admin-section">
            <h2>All Student Results</h2>
            <div id="admin-results-grid" class="grid-3" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.admin-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if(!App.state.user || App.state.user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const quizzes = await App.api('/quizzes/');
                document.getElementById('admin-quiz-grid').innerHTML = quizzes.map(q => `
                    <div class="card">
                        <h3>${q.quiz_title}</h3>
                        <p style="color: var(--text-muted); margin-bottom: 10px;">${q.category}</p>
                        <p>Questions: ${q.total_questions}</p>
                        <p>Duration: ${q.duration}m</p>
                        <button class="btn btn-outline" style="width: 100%; margin-top: 15px;">Edit</button>
                    </div>
                `).join('');

                const questions = await App.api('/questions/');
                document.getElementById('questions-list').innerHTML = questions.map(q => `
                    <div class="card" style="margin-bottom: 15px;">
                        <span class="badge badge-primary" style="margin-bottom: 10px; display: inline-block;">${q.quiz_title}</span>
                        <h4 style="margin-bottom: 10px;">${q.question}</h4>
                        <ul style="list-style: none; color: var(--text-muted); margin-bottom: 10px; padding-left: 10px;">
                            <li>A) ${q.option1}</li>
                            <li>B) ${q.option2}</li>
                            <li>C) ${q.option3}</li>
                            <li>D) ${q.option4}</li>
                        </ul>
                        <p style="color: var(--success); font-weight: bold;">Correct: ${q.correct_answer}</p>
                    </div>
                `).join('');

                const results = await App.api('/results/');
                document.getElementById('admin-results-grid').innerHTML = results.map(r => `
                    <div class="card" style="border-top: 4px solid ${r.result_status === 'Pass' ? 'var(--success)' : 'var(--danger)'}">
                        <h4 style="margin-bottom: 5px;">${r.student_name}</h4>
                        <p style="color: var(--primary); margin-bottom: 10px;">${r.quiz_title}</p>
                        <div style="font-size: 24px; font-weight: bold;">${r.percentage}%</div>
                        <span class="badge ${r.result_status === 'Pass' ? 'badge-success' : 'badge-danger'}">
                            ${r.result_status}
                        </span>
                    </div>
                `).join('');

            } catch(err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
