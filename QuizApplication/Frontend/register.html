<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuizApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <span>📚</span> QuizApp
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 450px; margin-top: 40px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 24px; font-size: 24px;">Student Registration</h2>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>College / University</label>
                    <input type="text" id="college" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px; padding: 12px;">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted);">
                Already registered? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                student_id: Math.floor(Math.random() * 10000),
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                college: document.getElementById('college').value,
                password: document.getElementById('password').value,
                role: 'student'
            };

            try {
                await App.api('/students/add/', 'POST', data);
                App.showToast('Registration successful! Please login.');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
