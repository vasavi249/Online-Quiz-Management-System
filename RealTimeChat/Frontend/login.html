<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChatApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--bg-dark); align-items: center; justify-content: center;">
    
    <div class="auth-container">
        <div class="auth-header">
            <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">💬 ChatApp</h1>
            <p style="color: var(--text-secondary);">Sign in to continue</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 20px;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const users = await App.api('/users/');
                const user = users.find(u => u.username === username && u.password === password);
                
                if(user) {
                    App.setUser(user);
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Invalid credentials');
                }
            } catch (err) {
                alert('Error logging in');
            }
        });
    </script>
</body>
</html>
