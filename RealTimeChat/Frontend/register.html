<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ChatApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--bg-dark); align-items: center; justify-content: center;">
    
    <div class="auth-container">
        <div class="auth-header">
            <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">💬 ChatApp</h1>
            <p style="color: var(--text-secondary);">Create a new account</p>
        </div>
        
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullname" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 20px;">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
            Already registered? <a href="login.html">Login</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                user_id: Math.floor(Math.random() * 10000),
                full_name: document.getElementById('fullname').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                profile_image: "default.png"
            };

            try {
                await App.api('/users/register/', 'POST', data);
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } catch (err) {
                alert('Error registering user');
            }
        });
    </script>
</body>
</html>
